spring:
  application:
    name: ai-code-helper
  profiles:
    active: local
server:
  port: 8011
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
langchain4j:
  community:
    dashscope:
      chat-model:
        model-name: qwen-plus
        api-key: ${DASHSCOPE_API_KEY:your-api-key-here}
      embedding-model:
        model-name: text-embedding-v4
        api-key: ${DASHSCOPE_API_KEY:your-api-key-here}
      streaming-chat-model:
        model-name: qwen-plus
        api-key: ${DASHSCOPE_API_KEY:your-api-key-here}
bigmodel:
  api-key: ${BIGMODEL_API_KEY:your-api-key-here}
ai:
  rag:
    docs:
      path: ${AI_RAG_DOCS_PATH:src/main/resources/docs}
